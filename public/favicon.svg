<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="none" viewBox="0 0 64 64">
  <defs>
    <filter id="hexGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f0f8"/>
      <stop offset="35%" stop-color="#b8b8d0"/>
      <stop offset="50%" stop-color="#e8e8f4"/>
      <stop offset="65%" stop-color="#9098b0"/>
      <stop offset="100%" stop-color="#d8d8e8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffeaaa"/>
      <stop offset="30%" stop-color="#e8b840"/>
      <stop offset="50%" stop-color="#fff0c0"/>
      <stop offset="70%" stop-color="#c89030"/>
      <stop offset="100%" stop-color="#ffd866"/>
    </linearGradient>
    <linearGradient id="prismatic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff7eb3"/>
      <stop offset="20%" stop-color="#c461ff"/>
      <stop offset="40%" stop-color="#5ec5ff"/>
      <stop offset="60%" stop-color="#47ff94"/>
      <stop offset="80%" stop-color="#ff7eb3"/>
      <stop offset="100%" stop-color="#c461ff"/>
    </linearGradient>
    <linearGradient id="hexBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b4fff"/>
      <stop offset="50%" stop-color="#a878ff"/>
      <stop offset="100%" stop-color="#6040d0"/>
    </linearGradient>
  </defs>

  <polygon points="32,2 58,17 58,47 32,62 6,47 6,17"
    fill="none" stroke="#7b4fff" stroke-width="1" opacity="0.3" filter="url(#hexGlow)"/>
  <polygon points="32,3 57,17.5 57,46.5 32,61 7,46.5 7,17.5"
    fill="none" stroke="url(#hexBorder)" stroke-width="1.8" filter="url(#hexGlow)"/>
  <polygon points="32,5 55.5,18.5 55.5,45.5 32,59 8.5,45.5 8.5,18.5"
    fill="#0d0820" stroke="#6040d0" stroke-width="0.5" opacity="0.95"/>

  <ellipse cx="32" cy="32" rx="10" ry="18" fill="#7b4fff" opacity="0.08"/>

  <rect x="21" y="17" width="5" height="30" rx="2.5" fill="url(#silver)" opacity="0.9"/>
  <rect x="29.5" y="14" width="5" height="36" rx="2.5" fill="url(#gold)" opacity="0.95"/>
  <rect x="38" y="17" width="5" height="30" rx="2.5" fill="url(#prismatic)" opacity="0.9"/>

  <circle cx="32" cy="4.5" r="1.2" fill="#a878ff" opacity="0.7"/>
  <circle cx="56.5" cy="18" r="1" fill="#a878ff" opacity="0.5"/>
  <circle cx="56.5" cy="46" r="1" fill="#a878ff" opacity="0.5"/>
  <circle cx="32" cy="59.5" r="1" fill="#a878ff" opacity="0.4"/>
  <circle cx="7.5" cy="46" r="1" fill="#a878ff" opacity="0.5"/>
  <circle cx="7.5" cy="18" r="1" fill="#a878ff" opacity="0.5"/>
</svg>
